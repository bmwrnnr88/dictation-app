<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dictation Spelling Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Dictation Spelling Game</h1>
<div class="sub">Teacher loads sentences. Click Start Session to begin.</div>
</header>

<main class="grid">

<section class="card" id="teacherPanel">

<h2>Teacher</h2>

<div id="setupPanel">

<label class="label">Paste sentences (one per line)</label>

<textarea id="sentencesInput" rows="10"></textarea>

<div class="row">
<button id="startSessionBtn">Start Session</button>
<button id="shuffleBtn" class="secondary" disabled>Shuffle</button>
<button id="retryMissesBtn" class="secondary" disabled>Retry Misses</button>
</div>

<hr>

</div>

<div class="row">
<button id="speakBtn" disabled>Play</button>
<button id="repeatBtn" disabled>Repeat</button>
<button id="stopBtn" disabled>Stop</button>
</div>

<div class="row">
<label class="checkbox">
<input type="checkbox" id="autoSpeak">
Auto Play
</label>

<label class="checkbox">
<input type="checkbox" id="strictMode" checked>
Strict Mode
</label>
</div>

</section>

<section class="card">

<h2>Student</h2>

<div class="status">
<div>Round: <span id="roundNum">0</span>/<span id="roundTotal">0</span></div>
<div>Correct: <span id="correctCount">0</span> | Missed: <span id="missCount">0</span></div>
</div>

<textarea id="studentInput" rows="4" disabled></textarea>

<div class="row">
<button id="checkBtn" disabled>Check</button>
<button id="nextBtn" disabled>Next</button>
<button id="revealBtn" disabled>Reveal</button>
</div>

<div id="feedback"></div>

<details>
<summary>Show Correct Sentence</summary>
<div id="correctSentence"></div>
</details>

</section>

</main>

<script src="app.js"></script>

</body>
</html>
