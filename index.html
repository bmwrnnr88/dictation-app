<hr />

<label class="label">ElevenLabs (better voice)</label>

<div class="row">
  <label class="label-inline">Use</label>
  <select id="ttsProvider">
    <option value="browser">Browser voice</option>
    <option value="elevenlabs">ElevenLabs</option>
  </select>
</div>

<div class="row">
  <label class="label-inline">API Key</label>
  <input id="elevenKey" type="password" placeholder="Paste ElevenLabs API key (NOT safe for students)" />
</div>

<div class="row">
  <label class="label-inline">Voice</label>
  <input id="elevenVoiceId" type="text" placeholder="Voice ID (e.g., from ElevenLabs)" />
</div>

<div class="row">
  <label class="label-inline">Model</label>
  <select id="elevenModel">
    <option value="eleven_turbo_v2_5">eleven_turbo_v2_5 (fast)</option>
    <option value="eleven_multilingual_v2">eleven_multilingual_v2</option>
  </select>
</div>
